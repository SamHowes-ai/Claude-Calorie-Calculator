<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sam Howes Fitness – Calorie Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&family=Playfair+Display:wght@700&display=swap');

  *{box-sizing:border-box;margin:0;padding:0;}

  body{
    background:#0a0a0a;color:#f0f0f0;font-family:'Montserrat',sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:20px;
  }

  @keyframes floatCard {
    0%,100%{transform:translateY(0px);}
    50%{transform:translateY(-7px);}
  }
  @keyframes shimmer {
    0%{background-position:-200% center;}
    100%{background-position:200% center;}
  }
  @keyframes popIn {
    0%{opacity:0;transform:translateY(16px);}
    100%{opacity:1;transform:translateY(0);}
  }
  @keyframes countUp {
    from{opacity:0;transform:translateY(8px);}
    to{opacity:1;transform:translateY(0);}
  }

  .logo{text-align:center;margin-bottom:28px;opacity:0;animation:popIn .7s .1s cubic-bezier(.22,1,.36,1) forwards;}
  .logo span{font-family:'Playfair Display',serif;font-size:1.5rem;color:#c9a84c;letter-spacing:2px;}
  .logo p{font-size:.65rem;letter-spacing:4px;color:#888;text-transform:uppercase;margin-top:4px;}

  .card{
    background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:40px 36px;
    width:100%;max-width:500px;
    box-shadow:0 24px 80px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.03);
    animation:floatCard 7s ease-in-out infinite;
    opacity:0;animation:popIn .7s .25s cubic-bezier(.22,1,.36,1) forwards, floatCard 7s 1s ease-in-out infinite;
  }

  /* Progress */
  .progress{display:flex;gap:8px;margin-bottom:32px;}
  .progress-step{
    flex:1;height:3px;background:#1e1e1e;border-radius:2px;
    transition:background .5s cubic-bezier(.22,1,.36,1);
  }
  .progress-step.active{background:#c9a84c;}

  /* Step transition wrapper */
  .step-wrap{
    transition:opacity .25s ease, transform .25s cubic-bezier(.22,1,.36,1);
  }
  .step-wrap.leaving{
    opacity:0;transform:translateX(-18px);pointer-events:none;
  }
  .step-wrap.entering{
    opacity:0;transform:translateX(18px);
  }
  .step-wrap.visible{
    opacity:1;transform:translateX(0);
  }

  h2{font-family:'Playfair Display',serif;font-size:1.6rem;color:#fff;margin-bottom:6px;}
  .subtitle{font-size:.72rem;color:#666;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:28px;}

  .field{margin-bottom:18px;}
  label{display:block;font-size:.7rem;color:#888;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;}
  input,select{
    width:100%;background:#161616;border:1px solid #222;border-radius:10px;
    padding:13px 16px;color:#f0f0f0;font-family:'Montserrat',sans-serif;font-size:.9rem;
    outline:none;transition:border-color .2s, box-shadow .2s;
  }
  input:focus,select:focus{
    border-color:#c9a84c;
    box-shadow:0 0 0 3px rgba(201,168,76,.08);
  }
  select option{background:#161616;}

  .row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

  /* Gender buttons — no re-render, just class toggle */
  .gender-group{display:flex;gap:10px;}
  .gender-btn{
    flex:1;padding:12px;background:#161616;border:1px solid #222;border-radius:10px;
    color:#666;font-family:'Montserrat',sans-serif;font-size:.82rem;cursor:pointer;
    letter-spacing:.5px;transition:border-color .25s, color .25s, background .25s;
  }
  .gender-btn.selected{background:#1a1500;border-color:#c9a84c;color:#c9a84c;}

  /* Pace / barrier buttons — no re-render */
  .pace-group{display:flex;gap:10px;flex-direction:column;}
  .pace-btn{
    padding:14px 16px;background:#161616;border:1px solid #222;border-radius:10px;
    color:#aaa;font-family:'Montserrat',sans-serif;font-size:.82rem;cursor:pointer;
    transition:border-color .25s, background .25s, transform .25s cubic-bezier(.22,1,.36,1);
    text-align:left;
  }
  .pace-btn:hover{border-color:#333;transform:translateX(3px);}
  .pace-btn .pace-title{font-weight:700;color:#ccc;display:block;margin-bottom:3px;transition:color .25s;}
  .pace-btn .pace-desc{font-size:.72rem;color:#555;}
  .pace-btn.selected{background:#1a1500;border-color:#c9a84c;transform:translateX(3px);}
  .pace-btn.selected .pace-title{color:#c9a84c;}

  .btn{
    width:100%;padding:15px;
    background:linear-gradient(135deg,#c9a84c,#e8c96a);
    border:none;border-radius:10px;color:#0a0a0a;
    font-family:'Montserrat',sans-serif;font-weight:800;font-size:.88rem;
    letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:12px;
    transition:opacity .2s, transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
  }
  .btn:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.25);}
  .btn:active{transform:translateY(0);box-shadow:none;}

  .btn-outline{
    background:transparent;border:1px solid #222;color:#555;
    font-weight:600;margin-top:8px;box-shadow:none;
  }
  .btn-outline:hover{border-color:#444;color:#888;opacity:1;box-shadow:none;}

  .error{color:#e05555;font-size:.72rem;margin-top:6px;display:none;}

  /* Results */
  .stat-card{
    background:#141414;border:1px solid #1e1e1e;border-radius:14px;
    padding:20px 22px;margin-bottom:12px;
    opacity:0;animation:popIn .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .stat-card:nth-child(1){animation-delay:.05s;}
  .stat-card:nth-child(2){animation-delay:.12s;}

  .stat-label{font-size:.62rem;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
  .stat-value{font-size:2rem;font-weight:800;color:#c9a84c;line-height:1;}
  .stat-sub{font-size:.73rem;color:#444;margin-top:6px;}

  .macros{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
  .macro-card{
    background:#141414;border:1px solid #1e1e1e;border-radius:14px;padding:16px 12px;
    text-align:center;opacity:0;animation:popIn .5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .macro-card:nth-child(1){animation-delay:.2s;}
  .macro-card:nth-child(2){animation-delay:.27s;}
  .macro-card:nth-child(3){animation-delay:.34s;}
  .macro-label{font-size:.58rem;color:#555;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;}
  .macro-value{font-size:1.3rem;font-weight:800;color:#e0e0e0;}
  .macro-unit{font-size:.63rem;color:#444;margin-top:3px;}

  .timeline-card{
    background:linear-gradient(135deg,#141100,#1a1600);
    border:1px solid rgba(201,168,76,.15);border-radius:14px;
    padding:20px 22px;margin-bottom:16px;
    opacity:0;animation:popIn .5s .42s cubic-bezier(.22,1,.36,1) forwards;
  }
  .timeline-card .stat-value{font-size:1.55rem;}

  .cta-box{
    background:#111;border:1px solid rgba(201,168,76,.12);border-radius:14px;
    padding:24px;text-align:center;
    opacity:0;animation:popIn .5s .52s cubic-bezier(.22,1,.36,1) forwards;
  }
  .cta-box h3{font-family:'Playfair Display',serif;font-size:1.2rem;color:#c9a84c;margin-bottom:8px;}
  .cta-box p{font-size:.78rem;color:#666;margin-bottom:18px;line-height:1.7;}

  .btn-cta{
    padding:15px 32px;border:none;border-radius:10px;color:#0a0a0a;
    font-family:'Montserrat',sans-serif;font-weight:800;font-size:.82rem;
    letter-spacing:2px;text-transform:uppercase;cursor:pointer;
    text-decoration:none;display:inline-block;
    background:linear-gradient(90deg,#c9a84c,#e8c96a,#fff5c0,#e8c96a,#c9a84c);
    background-size:200% auto;
    animation:shimmer 3s linear infinite;
    transition:transform .2s cubic-bezier(.22,1,.36,1), box-shadow .2s;
  }
  .btn-cta:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(201,168,76,.35);}

  .lead-lock{text-align:center;margin-bottom:24px;}
  .lead-lock .lock-icon{font-size:2.2rem;margin-bottom:10px;display:block;}
  .lead-lock h2{font-size:1.45rem;}
  .lead-lock p{color:#666;font-size:.78rem;margin-top:8px;line-height:1.7;}

  .results-header{text-align:center;margin-bottom:24px;opacity:0;animation:popIn .5s cubic-bezier(.22,1,.36,1) forwards;}
  .results-header h2{font-size:1.7rem;}
  .results-header p{color:#555;font-size:.78rem;margin-top:6px;}

  .disclaimer{font-size:.62rem;color:#333;text-align:center;margin-top:20px;line-height:1.7;opacity:0;animation:popIn .6s .4s cubic-bezier(.22,1,.36,1) forwards;}
  .sending{opacity:.5;pointer-events:none;}
</style>
</head>
<body>

<div class="logo">
  <span>SAM HOWES FITNESS</span>
  <p>Premium Weight Management Coaching</p>
</div>

<div class="card" id="card">
  <div class="progress" id="progress"></div>
  <div id="stepContent"></div>
</div>

<p class="disclaimer">Results are estimates based on established formulas (Mifflin-St Jeor).<br>Always consult a healthcare professional before making dietary changes.</p>

<script>
const GHL_WEBHOOK = 'https://services.leadconnectorhq.com/hooks/PnQahILuttFxIjshfKat/webhook-trigger/68558633-7500-454b-a894-0bb207a37437';
const BOOKING_LINK = 'https://api.leadconnectorhq.com/widget/booking/DT84Wm1CtrP2JAS8BBfP';

const state = {
  step:1, gender:'', age:'', heightCm:'', weightKg:'',
  activity:'', targetKg:'', pace:'', barrier:'', name:'', email:'', phone:''
};

const activityLabels = {
  '1.2':   'Sedentary (desk job, little exercise)',
  '1.375': 'Lightly active (1–3x/week)',
  '1.55':  'Moderately active (3–5x/week)',
  '1.725': 'Very active (6–7x/week)',
  '1.9':   'Extremely active (physical job + training)'
};

const STEPS = [1, 2, 2.5, 3, 4];

function setProgress(){
  const prog = document.getElementById('progress');
  prog.innerHTML = '';
  const idx = STEPS.indexOf(state.step);
  STEPS.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'progress-step' + (i <= idx ? ' active' : '');
    prog.appendChild(d);
  });
}

// Smooth step transition — fade out, swap, fade in
function transitionTo(newStep){
  const wrap = document.querySelector('.step-wrap');
  if(!wrap){ state.step = newStep; render(true); return; }
  wrap.classList.add('leaving');
  setTimeout(()=>{
    state.step = newStep;
    render(true);
  }, 220);
}

function render(instant=false){
  setProgress();
  const c = document.getElementById('stepContent');
  let html = '';
  if(state.step===1)   html = step1HTML();
  if(state.step===2)   html = step2HTML();
  if(state.step===2.5) html = step25HTML();
  if(state.step===3)   html = step3HTML();
  if(state.step===4)   html = resultsHTML();

  if(instant){
    c.innerHTML = `<div class="step-wrap entering">${html}</div>`;
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        const w = c.querySelector('.step-wrap');
        if(w){ w.classList.remove('entering'); w.classList.add('visible'); }
      });
    });
  } else {
    c.innerHTML = `<div class="step-wrap visible">${html}</div>`;
  }

  attachEvents();
  if(state.step===4) runCountUps();
}

// Update only selection state without re-rendering step
function updateGenderUI(g){
  document.querySelectorAll('.gender-btn').forEach(b=>{
    b.classList.toggle('selected', b.dataset.gender===g);
  });
}
function updatePaceUI(p){
  document.querySelectorAll('[data-pace]').forEach(b=>{
    b.classList.toggle('selected', b.dataset.pace===p);
  });
}
function updateBarrierUI(b){
  document.querySelectorAll('[data-barrier]').forEach(el=>{
    el.classList.toggle('selected', el.dataset.barrier===b);
  });
}

function countUp(el, target, duration=1100){
  const startTime = performance.now();
  function update(now){
    const p = Math.min((now-startTime)/duration, 1);
    const ease = 1-Math.pow(1-p, 4);
    el.textContent = Math.round(target*ease).toLocaleString();
    if(p<1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}

function runCountUps(){
  const r = calcResults();
  setTimeout(()=>{
    [['tdee-val',r.tdee],['cals-val',r.targetCals],['prot-val',r.protein],
     ['carb-val',r.carbs],['fat-val',r.fat],['weeks-val',r.weeks]]
    .forEach(([id,val],i)=>{
      setTimeout(()=>{
        const el=document.getElementById(id);
        if(el) countUp(el,val,1000);
      }, i*60);
    });
  }, 150);
}

function step1HTML(){
  return `
    <h2>Your Stats</h2>
    <p class="subtitle">Step 1 of 4 — Tell us about you</p>
    <div class="field">
      <label>Gender</label>
      <div class="gender-group">
        <button class="gender-btn${state.gender==='male'?' selected':''}" data-gender="male">Male</button>
        <button class="gender-btn${state.gender==='female'?' selected':''}" data-gender="female">Female</button>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Age</label>
        <input type="number" id="age" placeholder="e.g. 35" value="${state.age}" min="15" max="99"/>
      </div>
      <div class="field">
        <label>Weight (kg)</label>
        <input type="number" id="weight" placeholder="e.g. 85" value="${state.weightKg}" min="30" max="300"/>
      </div>
    </div>
    <div class="field">
      <label>Height (cm)</label>
      <input type="number" id="height" placeholder="e.g. 175" value="${state.heightCm}" min="100" max="250"/>
    </div>
    <div class="field">
      <label>Activity Level</label>
      <select id="activity">
        <option value="">Select your activity level</option>
        ${Object.entries(activityLabels).map(([v,l])=>`<option value="${v}"${state.activity===v?' selected':''}>${l}</option>`).join('')}
      </select>
    </div>
    <div id="err1" class="error">Please fill in all fields.</div>
    <button class="btn" id="next1">Continue →</button>`;
}

function step2HTML(){
  const paces=[
    {id:'gentle',    title:'Gentle (0.25 kg/week)',  desc:'Sustainable, minimal sacrifice — ideal for long-term results'},
    {id:'moderate',  title:'Moderate (0.5 kg/week)', desc:'Balanced approach — the most popular choice'},
    {id:'aggressive',title:'Aggressive (1 kg/week)', desc:'Fast results — requires strong commitment'},
  ];
  return `
    <h2>Your Goal</h2>
    <p class="subtitle">Step 2 of 4 — Set your target</p>
    <div class="field">
      <label>Target Weight (kg)</label>
      <input type="number" id="targetWeight" placeholder="e.g. 75" value="${state.targetKg}" min="30" max="300"/>
    </div>
    <div class="field">
      <label>Preferred Pace</label>
      <div class="pace-group">
        ${paces.map(p=>`
          <button class="pace-btn${state.pace===p.id?' selected':''}" data-pace="${p.id}">
            <span class="pace-title">${p.title}</span>
            <span class="pace-desc">${p.desc}</span>
          </button>`).join('')}
      </div>
    </div>
    <div id="err2" class="error">Please fill in your target weight and select a pace.</div>
    <button class="btn" id="next2">Continue →</button>
    <button class="btn btn-outline" id="back2">← Back</button>`;
}

function step25HTML(){
  const barriers=[
    {id:'stress',     icon:'😩', title:'Stress & Emotional Eating',     desc:'Food becomes a coping mechanism for stress or emotions'},
    {id:'time',       icon:'⏰', title:'Lack of Time',                   desc:'Too busy to meal prep, cook or stay consistent'},
    {id:'knowledge',  icon:'🤷', title:'Not Knowing What to Eat',        desc:'Confused by conflicting advice and fad diets'},
    {id:'motivation', icon:'📉', title:'Staying Motivated & Consistent', desc:'Starting strong but struggling to keep momentum'},
  ];
  return `
    <h2>One Quick Question</h2>
    <p class="subtitle">Step 3 of 4 — Your biggest challenge</p>
    <div class="field">
      <label>What's your #1 barrier to reaching your goal?</label>
      <div class="pace-group">
        ${barriers.map(b=>`
          <button class="pace-btn${state.barrier===b.id?' selected':''}" data-barrier="${b.id}">
            <span class="pace-title">${b.icon} ${b.title}</span>
            <span class="pace-desc">${b.desc}</span>
          </button>`).join('')}
      </div>
    </div>
    <div id="err25" class="error">Please select your biggest barrier.</div>
    <button class="btn" id="next25">Continue →</button>
    <button class="btn btn-outline" id="back25">← Back</button>`;
}

function step3HTML(){
  return `
    <div class="lead-lock">
      <span class="lock-icon">🔒</span>
      <h2>Unlock Your Free Report</h2>
      <p>Enter your details below to instantly receive your personalised calorie targets, macro breakdown and weight loss timeline.</p>
    </div>
    <div class="field">
      <label>Full Name</label>
      <input type="text" id="leadName" placeholder="e.g. Alex Johnson" value="${state.name}"/>
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="leadEmail" placeholder="e.g. alex@email.com" value="${state.email}"/>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="leadPhone" placeholder="e.g. 021 123 4567" value="${state.phone}"/>
    </div>
    <div id="err3" class="error">Please fill in all fields with a valid email.</div>
    <button class="btn" id="next3">🔓 Reveal My Results</button>
    <button class="btn btn-outline" id="back3">← Back</button>`;
}

function calcResults(){
  const w=parseFloat(state.weightKg),h=parseFloat(state.heightCm),
        a=parseInt(state.age),act=parseFloat(state.activity),tw=parseFloat(state.targetKg);
  let bmr=state.gender==='male'?10*w+6.25*h-5*a+5:10*w+6.25*h-5*a-161;
  const tdee=Math.round(bmr*act);
  const weeklyKg=state.pace==='gentle'?0.25:state.pace==='moderate'?0.5:1;
  const deficit=weeklyKg*7700/7;
  const diff=w-tw;
  const losing=diff>0;
  const targetCals=losing?Math.round(tdee-deficit):Math.round(tdee+deficit);
  const protein=Math.round((targetCals*.30)/4);
  const carbs=Math.round((targetCals*.40)/4);
  const fat=Math.round((targetCals*.30)/9);
  const weeks=Math.round(Math.abs(diff)/weeklyKg);
  const months=(weeks/4.33).toFixed(1);
  return{tdee,targetCals,protein,carbs,fat,weeks,months,losing,weeklyKg,diff:Math.abs(diff).toFixed(1)};
}

function resultsHTML(){
  const r=calcResults();
  const goal=r.losing?'lose':'gain';
  return `
    <div class="results-header">
      <h2>Your Results</h2>
      <p>Personalised for ${state.name.split(' ')[0]}</p>
    </div>
    <div class="stat-card">
      <div class="stat-label">Daily Calorie Maintenance (TDEE)</div>
      <div class="stat-value"><span id="tdee-val">0</span> <span style="font-size:1rem;color:#444">kcal</span></div>
      <div class="stat-sub">What your body burns daily at your current activity level</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Your Daily Calorie Target</div>
      <div class="stat-value"><span id="cals-val">0</span> <span style="font-size:1rem;color:#444">kcal</span></div>
      <div class="stat-sub">To ${goal} ${r.diff} kg at ${r.weeklyKg} kg/week</div>
    </div>
    <div class="macros">
      <div class="macro-card">
        <div class="macro-label">Protein</div>
        <div class="macro-value"><span id="prot-val">0</span>g</div>
        <div class="macro-unit">per day</div>
      </div>
      <div class="macro-card">
        <div class="macro-label">Carbs</div>
        <div class="macro-value"><span id="carb-val">0</span>g</div>
        <div class="macro-unit">per day</div>
      </div>
      <div class="macro-card">
        <div class="macro-label">Fat</div>
        <div class="macro-value"><span id="fat-val">0</span>g</div>
        <div class="macro-unit">per day</div>
      </div>
    </div>
    <div class="timeline-card">
      <div class="stat-label">⏱ Estimated Timeline to Goal</div>
      <div class="stat-value"><span id="weeks-val">0</span> <span style="font-size:1.1rem;color:#c9a84c">weeks</span> <span style="font-size:.95rem;color:#444">(~${r.months} months)</span></div>
      <div class="stat-sub">Based on ${r.weeklyKg} kg/week at your chosen pace</div>
    </div>
    <div class="cta-box">
      <h3>Ready to Make It Happen?</h3>
      <p>These numbers are your starting point. With the right coaching, accountability and a personalised plan — results come faster and stick longer.</p>
      <a class="btn-cta" href="${BOOKING_LINK}" target="_blank">Book a Free Coaching Call</a>
    </div>`;
}

async function submitLead(n,e,p){
  const r=calcResults();
  try{
    await fetch(GHL_WEBHOOK,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        firstName:n.split(' ')[0],lastName:n.split(' ').slice(1).join(' ')||'',
        email:e,phone:p,gender:state.gender,age:state.age,
        currentWeightKg:state.weightKg,heightCm:state.heightCm,
        activityLevel:state.activity,targetWeightKg:state.targetKg,
        pace:state.pace,primaryBarrier:state.barrier,
        tdee:r.tdee,dailyCalorieTarget:r.targetCals,
        proteinG:r.protein,carbsG:r.carbs,fatG:r.fat,
        estimatedWeeks:r.weeks,estimatedMonths:r.months,
        source:'SHF Calorie Calculator'
      })
    });
  }catch(err){console.error('GHL webhook error:',err);}
}

function attachEvents(){
  // Gender — just toggle CSS, no re-render
  document.querySelectorAll('.gender-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      state.gender=b.dataset.gender;
      updateGenderUI(state.gender);
    });
  });

  // Pace — save target weight, toggle CSS only
  document.querySelectorAll('[data-pace]').forEach(b=>{
    b.addEventListener('click',()=>{
      const tw=document.getElementById('targetWeight');
      if(tw) state.targetKg=tw.value;
      state.pace=b.dataset.pace;
      updatePaceUI(state.pace);
    });
  });

  // Barrier — toggle CSS only
  document.querySelectorAll('[data-barrier]').forEach(b=>{
    b.addEventListener('click',()=>{
      state.barrier=b.dataset.barrier;
      updateBarrierUI(state.barrier);
    });
  });

  if(state.step===1){
    document.getElementById('next1').addEventListener('click',()=>{
      state.age=document.getElementById('age').value;
      state.weightKg=document.getElementById('weight').value;
      state.heightCm=document.getElementById('height').value;
      state.activity=document.getElementById('activity').value;
      if(!state.gender||!state.age||!state.weightKg||!state.heightCm||!state.activity){
        document.getElementById('err1').style.display='block'; return;
      }
      transitionTo(2);
    });
  }
  if(state.step===2){
    document.getElementById('next2').addEventListener('click',()=>{
      state.targetKg=document.getElementById('targetWeight').value;
      if(!state.targetKg||!state.pace){
        document.getElementById('err2').style.display='block'; return;
      }
      transitionTo(2.5);
    });
    document.getElementById('back2').addEventListener('click',()=>transitionTo(1));
  }
  if(state.step===2.5){
    document.getElementById('next25').addEventListener('click',()=>{
      if(!state.barrier){document.getElementById('err25').style.display='block';return;}
      transitionTo(3);
    });
    document.getElementById('back25').addEventListener('click',()=>transitionTo(2));
  }
  if(state.step===3){
    document.getElementById('next3').addEventListener('click',async()=>{
      const n=document.getElementById('leadName').value.trim();
      const e=document.getElementById('leadEmail').value.trim();
      const p=document.getElementById('leadPhone').value.trim();
      if(!n||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)||!p){
        document.getElementById('err3').style.display='block'; return;
      }
      state.name=n; state.email=e; state.phone=p;
      const btn=document.getElementById('next3');
      btn.textContent='Just a moment...'; btn.classList.add('sending');
      await submitLead(n,e,p);
      transitionTo(4);
    });
    document.getElementById('back3').addEventListener('click',()=>transitionTo(2.5));
  }
}

render();
</script>
</body>
</html>
